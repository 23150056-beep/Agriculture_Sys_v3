<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1900" viewBox="0 0 1200 1900">
  <defs>
    <style>
      .box { fill: #f7f7f7; stroke: #222; stroke-width: 2; }
      .uc-main { fill: #f7f7f7; stroke: #333; stroke-width: 2; }
      .uc-sub { fill: #f7f7f7; stroke: #444; stroke-width: 1.6; }
      .txt-title { font: 700 34px Arial, sans-serif; fill: #111; }
      .txt-main { font: 700 28px Arial, sans-serif; fill: #111; }
      .txt-sub { font: 500 22px Arial, sans-serif; fill: #111; }
      .txt-actor { font: 500 28px Arial, sans-serif; fill: #111; }
      .line { stroke: #333; stroke-width: 1.8; fill: none; }
      .inc { stroke: #444; stroke-width: 1.6; stroke-dasharray: 8 8; fill: none; }
      .inc-text { font: 600 18px Arial, sans-serif; fill: #111; }
      .actor-line { stroke: #333; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#444" />
    </marker>
  </defs>

  <!-- Actors -->
  <g transform="translate(60,760)">
    <circle cx="0" cy="0" r="14" class="actor-line" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="70" class="actor-line"/>
    <line x1="-28" y1="40" x2="28" y2="40" class="actor-line"/>
    <line x1="0" y1="70" x2="-24" y2="108" class="actor-line"/>
    <line x1="0" y1="70" x2="24" y2="108" class="actor-line"/>
    <text x="-40" y="150" class="txt-actor">Admin</text>
  </g>

  <g transform="translate(1130,640)">
    <circle cx="0" cy="0" r="14" class="actor-line" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="70" class="actor-line"/>
    <line x1="-28" y1="40" x2="28" y2="40" class="actor-line"/>
    <line x1="0" y1="70" x2="-24" y2="108" class="actor-line"/>
    <line x1="0" y1="70" x2="24" y2="108" class="actor-line"/>
    <text x="-55" y="150" class="txt-actor">Manager</text>
  </g>

  <g transform="translate(1130,960)">
