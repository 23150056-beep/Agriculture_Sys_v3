  <ellipse cx="660" cy="1650" rx="135" ry="26" class="uc-sub"/><text x="660" y="1658" text-anchor="middle" class="txt-sub">View Summary Metrics</text>
  <ellipse cx="840" cy="1650" rx="120" ry="26" class="uc-sub"/><text x="840" y="1658" text-anchor="middle" class="txt-sub">View Activity Log</text>
  <ellipse cx="1000" cy="1650" rx="110" ry="26" class="uc-sub"/><text x="1000" y="1658" text-anchor="middle" class="txt-sub">Export CSV Report</text>
  <line x1="540" y1="1560" x2="500" y2="1630" class="inc" marker-end="url(#arrow)"/><text x="500" y="1602" class="inc-text">&lt;&lt;include&gt;&gt;</text>
  <line x1="590" y1="1563" x2="640" y2="1630" class="inc" marker-end="url(#arrow)"/><text x="610" y="1602" class="inc-text">&lt;&lt;include&gt;&gt;</text>
  <line x1="650" y1="1563" x2="825" y2="1630" class="inc" marker-end="url(#arrow)"/><text x="720" y="1602" class="inc-text">&lt;&lt;include&gt;&gt;</text>
  <line x1="700" y1="1560" x2="980" y2="1630" class="inc" marker-end="url(#arrow)"/><text x="840" y="1602" class="inc-text">&lt;&lt;include&gt;&gt;</text>

