  <text x="600" y="80" text-anchor="middle" class="txt-title">Centralized Agricultural Product Distribution Management System</text>
  <text x="600" y="120" text-anchor="middle" class="txt-title">for the Bauang Agricultural Trade Center</text>
  <text x="600" y="160" text-anchor="middle" class="txt-title">(AGRI_SYS_V3)</text>

  <!-- Main use cases -->
  <ellipse cx="600" cy="230" rx="120" ry="30" class="uc-main"/><text x="600" y="240" text-anchor="middle" class="txt-main">Login</text>

  <ellipse cx="600" cy="360" rx="180" ry="36" class="uc-main"/><text x="600" y="371" text-anchor="middle" class="txt-main">User Management</text>

  <ellipse cx="600" cy="540" rx="200" ry="36" class="uc-main"/><text x="600" y="551" text-anchor="middle" class="txt-main">Listing Management</text>

  <ellipse cx="600" cy="760" rx="290" ry="40" class="uc-main"/><text x="600" y="772" text-anchor="middle" class="txt-main">Marketplace and Demand Management</text>

