    <line x1="0" y1="14" x2="0" y2="70" class="actor-line"/>
    <line x1="-28" y1="40" x2="28" y2="40" class="actor-line"/>
    <line x1="0" y1="70" x2="-24" y2="108" class="actor-line"/>
    <line x1="0" y1="70" x2="24" y2="108" class="actor-line"/>
    <text x="-70" y="150" class="txt-actor">Distributor</text>
